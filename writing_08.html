<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>三字經生成提示詞工具</title>
<style>
body{
    font-family: "Noto Sans TC", sans-serif;
    background:#f6f8fb;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:120px;
    margin-top:5px;
    margin-bottom:15px;
    font-size:16px;
    padding:10px;
}

select{
    width:100%;
    padding:8px;
    margin-bottom:15px;
    font-size:15px;
}

button{
    background:#4a90e2;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#357abd;
}

.output{
    margin-top:20px;
    background:#f0f4ff;
    padding:15px;
    white-space:pre-wrap;
    border-radius:8px;
    font-size:15px;
}
</style>
</head>

<body>
<div class="container">

<h1>三字經生成提示詞工具</h1>

<label>創作主題 / 素材</label>
<textarea id="content" placeholder="請貼入主題或素材，例如：春天城市、花衣人故事、人生哲理..."></textarea>

<label>語氣風格</label>
<select id="tone">
<option>典雅古訓</option>
<option>哲理格言</option>
<option>敘事簡述</option>
<option>詩意意境</option>
</select>

<label>意境強度</label>
<select id="mood">
<option>淡雅</option>
<option>中等</option>
<option>濃厚</option>
</select>

<label>張力程度</label>
<select id="tension">
<option>平穩</option>
<option>微張力</option>
<option>遞進張力</option>
<option>強反轉</option>
</select>

<button onclick="generatePrompt()">產生三字經提示詞</button>

<div class="output" id="output"></div>

</div>

<script>
function generatePrompt(){

let content = document.getElementById("content").value;
let tone = document.getElementById("tone").value;
let mood = document.getElementById("mood").value;
let tension = document.getElementById("tension").value;

let prompt = `
你是一位精通中國古典蒙學文體的文學生成模型。

請將以下素材轉寫為「三字經風格」文本。

【創作素材】
${content}

【文體要求】
- 每句三字
- 節奏整齊
- 可多行排列
- 具教育或文學意味

【語氣風格】
${tone}

【意境強度】
${mood}

【張力程度】
${tension}

【語言要求】
- 使用文言風格
- 避免現代白話句
- 優先使用意象表達
- 可使用對偶與遞進

【輸出格式】
三字句逐行排列
不需額外解釋
`;

document.getElementById("output").textContent = prompt;
}
</script>

</body>
</html>
