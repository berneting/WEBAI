<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WEBAI 首頁</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Microsoft JhengHei", sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  /* 改為沉穩科技藍色系 */
  background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c3b57);
  background-size: 400% 400%;
  animation: bgMove 14s ease infinite;
}

@keyframes bgMove {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

.bubble {
  position: absolute;
  bottom: -120px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  animation: floatUp linear infinite;
}

.bubble:nth-child(1){ width:80px;height:80px;left:10%;animation-duration:18s;}
.bubble:nth-child(2){ width:50px;height:50px;left:30%;animation-duration:14s;}
.bubble:nth-child(3){ width:100px;height:100px;left:65%;animation-duration:22s;}
.bubble:nth-child(4){ width:60px;height:60px;left:85%;animation-duration:16s;}

@keyframes floatUp{
  from{ transform:translateY(0); opacity:0.7;}
  to{ transform:translateY(-120vh); opacity:0;}
}

.card{
  position:relative;
  z-index:2;
  width:min(90%,700px);

  /* 改為深色玻璃卡片 */
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(12px);

  border-radius:24px;
  padding:50px 30px;
  text-align:center;

  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  color:white;
}

h1{
  margin:0 0 16px;
  font-size:2.3rem;
  letter-spacing:1px;
}

p{
  margin:0 0 30px;
  font-size:1.1rem;
  opacity:0.9;
  line-height:1.8;
}

.main-btn{
  display:inline-block;
  padding:18px 36px;
  font-size:1.15rem;
  font-weight:bold;

  /* 改為科技藍按鈕 */
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;

  border:none;
  border-radius:999px;
  cursor:pointer;
  text-decoration:none;

  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  transition:0.25s;
}

.main-btn:hover{
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 15px 35px rgba(0,0,0,0.45);
}

.main-btn:active{
  transform:scale(0.96);
}

.note{
  margin-top:24px;
  font-size:0.95rem;
  line-height:1.7;
  opacity:0.85;
}

/* 手機 */
@media (max-width:600px){
  h1{ font-size:1.8rem; }
  .main-btn{
    width:100%;
    max-width:320px;
  }
}

</style>
</head>

<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="card">

<h1>Prompt Engineering</h1>
<p>AI 提示詞工具</p>

<a class="main-btn" href="./ai_prompt.html">
行銷文宣生成器
</a>

<div class="note">
提示工程（Prompt Engineering）是透過設計、優化與精煉輸入給大型語言模型（LLM）的指令（Prompt），以引導 AI 生成高質量、精確且相關輸出的藝術與科學。它能減少模型幻覺、控制輸出風格、賦能複雜任務，是目前與 AI 溝通的核心技術。
</div>

</div>

</body>
</html>
