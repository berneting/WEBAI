
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>摘要轉 AI 提示句生成器</title>
  <style>
    :root {
      --bg1: #eef4ff;
      --bg2: #f8fbff;
      --card: #ffffff;
      --line: #d7e3f4;
      --text: #1f2a37;
      --sub: #5b6b82;
      --accent: #4f7cff;
      --accent2: #7b61ff;
      --soft: #edf3ff;
      --shadow: 0 12px 32px rgba(53, 90, 160, 0.12);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      line-height: 1.65;
    }

    .wrap {
      max-width: 1180px;
      margin: 36px auto;
      padding: 0 18px 36px;
    }

    .hero {
      background: linear-gradient(135deg, #fdfcff, #eef4ff 60%, #f4f0ff);
      border: 1px solid #dde7fb;
      border-radius: 24px;
      padding: 28px 26px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.25;
    }

    .hero p {
      margin: 8px 0;
      color: var(--sub);
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .row {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .hint {
      color: var(--sub);
      font-size: 13px;
      margin-top: 6px;
    }

    select, textarea, input[type="text"] {
      width: 100%;
      border: 1px solid #cfdcf0;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select:focus, textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.12);
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .small-area {
      min-height: 110px;
    }

    .output-area {
      min-height: 420px;
      background: #fcfdff;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 20px rgba(79, 124, 255, 0.18);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .secondary {
      background: #eef4ff;
      color: #3554a5;
      box-shadow: none;
      border: 1px solid #d8e4ff;
    }

    .structure-box {
      background: var(--soft);
      border: 1px dashed #bdd0ff;
      border-radius: 14px;
      padding: 12px 14px;
      color: #3554a5;
      font-size: 14px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--sub);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 900px) {
      .grid, .two-col {
        grid-template-columns: 1fr;
      }
      .hero h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>摘要轉 AI 提示句生成器</h1>
      <p>把文章或研究摘要貼進去，選擇想要的寫作結構，就能自動生成一段可直接貼回 AI 的提示句。</p>
      <p>適合做雜誌型評論文、教育評論、政策分析、案例解析、學術轉譯等用途。</p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>輸入區</h2>

        <div class="row">
          <label for="structure">選擇文章結構</label>
          <select id="structure"></select>
          <div class="structure-box" id="structurePreview"></div>
        </div>

        <div class="row two-col">
          <div>
            <label for="tone">文章風格</label>
            <select id="tone">
              <option value="雜誌型評論風，專業、流暢、具有時代感">雜誌型評論風</option>
              <option value="教育評論風，理性清楚、適合教學與課堂討論">教育評論風</option>
              <option value="政策分析風，重點明確、具制度視角">政策分析風</option>
              <option value="學術轉譯風，保留深度但讓一般讀者易懂">學術轉譯風</option>
              <option value="公共書寫風，易讀、平衡、具有社會觀點">公共書寫風</option>
            </select>
          </div>
          <div>
            <label for="length">字數設定</label>
            <select id="length">
              <option value="約600–800字">約600–800字</option>
              <option value="約800–1200字" selected>約800–1200字</option>
              <option value="約1200–1600字">約1200–1600字</option>
              <option value="約1600–2200字">約1600–2200字</option>
            </select>
          </div>
        </div>

        <div class="row">
          <label for="reader">目標讀者</label>
          <input id="reader" type="text" value="一般大眾與具有基本閱讀能力的非專業讀者" />
        </div>

        <div class="row">
          <label for="extra">額外要求（可空白）</label>
          <textarea id="extra" class="small-area" placeholder="例如：不要用太口語、保留批判性、適合報告引用、避免過度誇大研究結果"></textarea>
        </div>

        <div class="row">
          <label for="summary">貼上文章摘要或研究摘要</label>
          <textarea id="summary" placeholder="請在此貼上摘要內容"></textarea>
          <div class="hint">可貼研究摘要、新聞導言、論文摘要、報導摘要、課堂文章摘要等。</div>
        </div>

        <div class="btns">
          <button class="primary" onclick="generatePrompt()">生成提示句</button>
          <button class="secondary" onclick="clearAllFields()">清空內容</button>
          <button class="secondary" onclick="pasteExample()">放入示例摘要</button>
        </div>
      </div>

      <div class="card">
        <h2>可回貼 AI 的提示句</h2>
        <div class="row">
          <label for="output">生成結果</label>
          <textarea id="output" class="output-area" placeholder="按下『生成提示句』後，這裡會出現可直接複製貼回 AI 的完整提示句"></textarea>
        </div>

        <div class="btns">
          <button class="primary" onclick="copyOutput()">複製提示句</button>
          <button class="secondary" onclick="downloadPrompt()">下載 TXT</button>
        </div>

        <div class="footer-note">
          建議流程：貼上摘要 → 選結構 → 生成提示句 → 複製 → 貼回 ChatGPT 或其他 AI 工具。
        </div>
      </div>
    </section>
  </div>

  <script>
    const structureMap = {
      "magazine": {
        name: "雜誌型評論文",
        preview: "問題 → 趨勢 → 核心概念 → 案例 → 對比 → 提升到社會層次 → 收束",
        instruction: `文章必須依序包含以下結構：
1. 問題引入：從摘要涉及的議題提出2到3個能引發思考的問題
2. 趨勢背景：說明此議題所在的時代、社會、科技或教育趨勢
3. 核心概念：提煉最重要的觀點、發現或命題，並用容易理解的方式說明
4. 案例說明：用具體情境、可能應用場景或生活化例子讓抽象概念落地
5. 對比觀點：指出若沿用舊觀念、舊制度、舊方法，可能出現的限制或問題
6. 提升到社會層次：討論此議題對社會、教育、文化或人類能力的意義
7. 收束結論：用具有思考性與餘韻的方式作結`
      },
      "education": {
        name: "教育評論文",
        preview: "教育問題 → 現況背景 → 核心教學觀點 → 校園情境 → 制度對比 → 教育意義 → 結語",
        instruction: `文章必須依序包含以下結構：
1. 教育問題：指出學生、教師、學校或學習方式面臨的核心問題
2. 現況背景：說明教育現場或時代變化下的背景脈絡
3. 核心教學觀點：整理出最值得討論的教育理念或學習概念
4. 校園情境：舉出教學現場、學生學習或課堂應用的具體情境
5. 制度對比：比較新舊教學方式、制度落差或理念差異
6. 教育意義：提升到教育目的、人才培育或學習能力層次
7. 結語：用理性、具有延伸性的方式總結`
      },
      "policy": {
        name: "政策分析文",
        preview: "議題挑戰 → 背景脈絡 → 政策核心 → 實際場景 → 國際或制度對比 → 社會影響 → 結論",
        instruction: `文章必須依序包含以下結構：
1. 議題挑戰：指出當前制度或社會面臨的核心挑戰
2. 背景脈絡：交代政策、產業、教育或社會轉型背景
3. 政策核心：整理出摘要中的主要策略、觀點或改革重點
4. 實際場景：用實際應用場景、群體影響或執行情境來說明
5. 國際或制度對比：與傳統作法、他國經驗或不同制度進行比較
6. 社會影響：分析對社會、產業、教育或公民能力的意義
7. 結論：用平衡、具反思性的方式收尾`
      },
      "academic": {
        name: "學術轉譯評論文",
        preview: "研究提問 → 研究背景 → 關鍵發現 → 生活化解釋 → 與既有觀點對比 → 延伸社會意義 → 收束",
        instruction: `文章必須依序包含以下結構：
1. 研究提問：從摘要中提煉出最值得思考的研究問題
2. 研究背景：說明研究為何重要，它回應了什麼時代或知識問題
3. 關鍵發現：以清楚易懂的方式說明研究最重要的內容
4. 生活化解釋：使用比喻、情境或例子降低理解門檻
5. 與既有觀點對比：說明此研究與既有理解、傳統作法或常見印象的差異
6. 延伸社會意義：討論此研究對社會、教育、健康或人類生活的意義
7. 收束：以具有思考性的評論方式作結`
      },
      "problem": {
        name: "問題解決型評論文",
        preview: "問題現象 → 成因背景 → 關鍵觀點 → 解法案例 → 不同路徑對比 → 更大層次意義 → 結尾",
        instruction: `文章必須依序包含以下結構：
1. 問題現象：先點出最令人關注的現象或困境
2. 成因背景：分析這個問題背後的脈絡、原因或結構
3. 關鍵觀點：整理出摘要中最具啟發性的概念或解法
4. 解法案例：舉出具體應用、想像場景或可行路徑
5. 不同路徑對比：比較不同做法的優缺點或風險
6. 更大層次意義：討論對制度、社會或人的能力有何啟示
7. 結尾：以開放而有力的方式總結`
      }
    };

    const structureSelect = document.getElementById("structure");
    const structurePreview = document.getElementById("structurePreview");

    function initStructures() {
      Object.entries(structureMap).forEach(([key, value]) => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = value.name;
        structureSelect.appendChild(opt);
      });
      structureSelect.value = "magazine";
      updatePreview();
      structureSelect.addEventListener("change", updatePreview);
    }

    function updatePreview() {
      const picked = structureMap[structureSelect.value];
      structurePreview.textContent = picked.preview;
    }

    function generatePrompt() {
      const structure = structureMap[structureSelect.value];
      const tone = document.getElementById("tone").value;
      const length = document.getElementById("length").value;
      const reader = document.getElementById("reader").value.trim();
      const extra = document.getElementById("extra").value.trim();
      const summary = document.getElementById("summary").value.trim();
      const output = document.getElementById("output");

      if (!summary) {
        alert("請先貼上摘要內容。");
        return;
      }

      let prompt = `請將以下摘要改寫為一篇${tone}的文章。\n`;
      prompt += `目標讀者為：${reader || "一般大眾"}。\n`;
      prompt += `文章字數：${length}。\n\n`;
      prompt += `${structure.instruction}\n\n`;
      prompt += `寫作要求：\n`;
      prompt += `- 使用完整段落書寫，不要用條列式輸出成品\n`;
      prompt += `- 文章要有評論文章的流暢感與可讀性\n`;
      prompt += `- 避免過度學術腔，如「本研究指出」「研究結果顯示」可視情況轉化為較自然寫法\n`;
      prompt += `- 不可杜撰具體數據、年份、人物或案例；若摘要未提供，就以合理概括方式表達\n`;
      prompt += `- 可保留理性分析，但要讓非專業讀者也看得懂\n`;
      prompt += `- 可為文章加入適度過渡語，使各段銜接自然\n`;

      if (extra) {
        prompt += `- 額外要求：${extra}\n`;
      }

      prompt += `\n以下為摘要：\n【${summary}】`;

      output.value = prompt;
    }

    function copyOutput() {
      const output = document.getElementById("output");
      if (!output.value.trim()) {
        alert("目前沒有可複製的提示句。");
        return;
      }
      output.select();
      output.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(output.value)
        .then(() => alert("提示句已複製"))
        .catch(() => alert("複製失敗，請手動複製"));
    }

    function downloadPrompt() {
      const text = document.getElementById("output").value.trim();
      if (!text) {
        alert("目前沒有可下載的提示句。");
        return;
      }
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "ai_prompt_generator_output.txt";
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearAllFields() {
      document.getElementById("extra").value = "";
      document.getElementById("summary").value = "";
      document.getElementById("output").value = "";
      document.getElementById("reader").value = "一般大眾與具有基本閱讀能力的非專業讀者";
      document.getElementById("tone").value = "雜誌型評論風，專業、流暢、具有時代感";
      document.getElementById("length").value = "約800–1200字";
      structureSelect.value = "magazine";
      updatePreview();
    }

    function pasteExample() {
      document.getElementById("summary").value = "AI正在改變教育現場。當知識查找與標準答案越來越容易取得，學校的角色不再只是傳遞資訊，而是培養學生如何設定學習目標、使用工具、判斷資訊品質，並發展自主學習與自我調節的能力。部分國家已開始將AI素養納入課程與師資培訓，但若制度仍被升學主義主導，改革可能流於表面。";
    }

    initStructures();
  </script>
</body>
</html>
