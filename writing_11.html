<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>研究寫作提示句工具</title>
  <style>
    :root{
      --bg:#f6f2ea;
      --panel:#fffdf8;
      --ink:#2d2a26;
      --soft:#6b6258;
      --line:#d8cfc2;
      --accent:#8b6f47;
      --accent-2:#b7986b;
      --accent-3:#efe7d9;
      --shadow:0 12px 28px rgba(66, 49, 25, .08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Noto Serif TC","PingFang TC","Microsoft JhengHei",serif;
      background:
        radial-gradient(circle at top left, rgba(183,152,107,.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(139,111,71,.11), transparent 24%),
        var(--bg);
      color:var(--ink);
      line-height:1.7;
    }

    .wrap{
      max-width:1380px;
      margin:0 auto;
      padding:28px 20px 56px;
    }

    .hero{
      background:linear-gradient(135deg, rgba(139,111,71,.12), rgba(255,255,255,.78));
      border:1px solid rgba(139,111,71,.18);
      border-radius:24px;
      padding:24px 28px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .badge{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      background:#efe7d9;
      color:#5c4727;
      font-size:.83rem;
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:clamp(1.8rem,3vw,2.7rem);
      line-height:1.2;
      letter-spacing:.03em;
    }

    .grid{
      display:grid;
      grid-template-columns:1.06fr .94fr;
      gap:20px;
      align-items:start;
    }

    @media (max-width: 1024px){
      .grid{grid-template-columns:1fr}
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
    }

    .section-title{
      margin:0 0 14px;
      font-size:1.08rem;
      letter-spacing:.04em;
      color:#4c3c27;
    }

    .field{margin-bottom:14px;}

    .field label{
      display:block;
      font-weight:700;
      margin-bottom:7px;
      font-size:.96rem;
    }

    .hint{
      color:var(--soft);
      font-size:.88rem;
      margin-top:5px;
    }

    textarea, select, input[type="text"]{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 13px;
      font-size:0.98rem;
      background:#fff;
      color:var(--ink);
      outline:none;
      transition:.18s ease;
      font-family:inherit;
    }

    textarea:focus, select:focus, input:focus{
      border-color:var(--accent-2);
      box-shadow:0 0 0 4px rgba(183,152,107,.15);
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .two{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .three{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
    }

    @media (max-width: 760px){
      .two,.three{grid-template-columns:1fr}
    }

    .check-row{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px 14px;
      margin-top:6px;
    }

    @media (max-width:800px){
      .check-row{grid-template-columns:1fr}
    }

    .check{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
    }

    .check input{
      margin-top:4px;
      transform:scale(1.05);
      accent-color:var(--accent);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:0.96rem;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
      font-family:inherit;
    }

    .primary{
      background:linear-gradient(135deg, var(--accent), #6f5638);
      color:#fff;
    }

    .primary:hover{ transform:translateY(-1px); }

    .secondary{
      background:#efe7d9;
      color:#4f402d;
    }

    .secondary:hover{ background:#e7dcc9; }

    .ghost{
      background:#fff;
      color:#5d5348;
      border:1px solid var(--line);
    }

    .ghost:hover{ background:#faf7f1; }

    .output{
      min-height:560px;
      white-space:pre-wrap;
      background:#fff;
      border:1px dashed var(--accent-2);
      border-radius:16px;
      padding:16px;
      font-size:0.98rem;
      line-height:1.82;
      overflow:auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="badge">Research Writing Prompt Tool</div>
      <h1>研究寫作提示句工具</h1>
    </section>

    <div class="grid">
      <section class="card">
        <h2 class="section-title">一、研究材料輸入</h2>

        <div class="field">
          <label for="methods">Methods / 方法學</label>
          <textarea id="methods" placeholder="請貼入方法學內容。"></textarea>
        </div>

        <div class="field">
          <label for="results">Results / 結果報告</label>
          <textarea id="results" placeholder="請貼入結果報告。"></textarea>
        </div>

        <div class="three">
          <div class="field">
            <label for="topic">研究主題（選填）</label>
            <input id="topic" type="text" placeholder="例如：EEAC-induced phospholipid remodeling in hepatocytes" />
          </div>
          <div class="field">
            <label for="population">研究對象或模型（選填）</label>
            <input id="population" type="text" placeholder="例如：AML-12 hepatocytes" />
          </div>
          <div class="field">
            <label for="outcomes">主要結果領域（選填）</label>
            <input id="outcomes" type="text" placeholder="例如：transcriptomics, lipidomics" />
          </div>
        </div>

        <div class="field">
          <label for="extraContext">補充寫作要求（選填）</label>
          <textarea id="extraContext" style="min-height:110px;" placeholder="例如：不要寫成 review 口氣；請保留結果先行、機制後置。"></textarea>
        </div>

        <div class="actions">
          <button class="primary" onclick="generatePrompt()">生成提示句</button>
          <button class="secondary" onclick="copyPrompt()">複製提示句</button>
          <button class="ghost" onclick="resetAll()">全部清空</button>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">二、控制參數</h2>

        <div class="three">
          <div class="field">
            <label for="sectionType">目標章節</label>
            <select id="sectionType">
              <option value="Introduction">Introduction</option>
              <option value="Discussion" selected>Discussion</option>
            </select>
          </div>
          <div class="field">
            <label for="studyType">研究類型</label>
            <select id="studyType">
              <option value="Original research" selected>原始研究</option>
              <option value="Systematic review">系統性回顧</option>
              <option value="Meta-analysis">統合分析</option>
              <option value="Network meta-analysis">網絡統合分析</option>
            </select>
          </div>
          <div class="field">
            <label for="targetLanguage">目標章節輸出語言</label>
            <select id="targetLanguage">
              <option value="English" selected>English</option>
              <option value="Traditional Chinese">繁體中文</option>
              <option value="Bilingual with English main text">中英混合，以英文為主</option>
            </select>
          </div>
        </div>

        <div class="three">
          <div class="field">
            <label for="discipline">學科風格</label>
            <select id="discipline">
              <option value="Medical academic">醫學學術</option>
              <option value="Biomedical" selected>生物醫學</option>
              <option value="Public health and epidemiology">公衛與流行病學</option>
              <option value="General scientific writing">一般科學寫作</option>
            </select>
          </div>
          <div class="field">
            <label for="journalOrientation">期刊敘事取向</label>
            <select id="journalOrientation">
              <option value="High-impact general journal">綜合型高影響</option>
              <option value="Clinical specialty journal">臨床專科</option>
              <option value="Biomedical journal" selected>生物醫學</option>
              <option value="Evidence-based journal">實證醫學</option>
              <option value="Methodologically rigorous journal">方法學嚴謹型</option>
            </select>
          </div>
          <div class="field">
            <label for="length">輸出長度</label>
            <select id="length">
              <option value="Concise">短</option>
              <option value="Standard" selected>中</option>
              <option value="Extended">長</option>
            </select>
          </div>
        </div>

        <div class="three">
          <div class="field">
            <label for="tone">詮釋強度</label>
            <select id="tone">
              <option value="Conservative">保守</option>
              <option value="Balanced">平衡</option>
              <option value="Interpretive" selected>詮釋型</option>
            </select>
          </div>
          <div class="field">
            <label for="paragraphMode">段落開頭模式</label>
            <select id="paragraphMode">
              <option value="Topic sentence first" selected>段首即重點</option>
              <option value="Highly condensed claim-led">高度凝練 claim-led</option>
              <option value="Traditional journal development">傳統期刊展開</option>
            </select>
          </div>
          <div class="field">
            <label for="proseDensity">科學語體密度</label>
            <select id="proseDensity">
              <option value="Standard academic">標準學術</option>
              <option value="Journal-style condensed">期刊凝練式</option>
              <option value="Highly condensed SCI style" selected>高度凝練 SCI 式</option>
            </select>
          </div>
        </div>

        <div class="three">
          <div class="field">
            <label for="mechanismMode">機制處理模式</label>
            <select id="mechanismMode">
              <option value="No mechanism unless unavoidable">原則上不寫機制</option>
              <option value="Conservative mechanism only">保守機制</option>
              <option value="Mechanism plus empirical example" selected>機制＋實證例子</option>
            </select>
          </div>
          <div class="field">
            <label for="exampleRequirement">例證要求</label>
            <select id="exampleRequirement">
              <option value="No example">不要求例證</option>
              <option value="One example per major paragraph">每個主要段落一例</option>
              <option value="One example per proposed mechanism" selected>每個機制一例</option>
            </select>
          </div>
          <div class="field">
            <label for="outputMode">章節驅動模式</label>
            <select id="outputMode">
              <option value="Direct article-writing prompt" selected>直接寫文章模式</option>
              <option value="Journal-prose forcing prompt">強制期刊語體模式</option>
              <option value="Ultra-controlled sentence architecture">超嚴格句位控制模式</option>
            </select>
          </div>
        </div>

        <div class="three">
          <div class="field">
            <label for="subheadingMode">段落功能小標題模式</label>
            <select id="subheadingMode">
              <option value="No visible subheadings" selected>無小標題</option>
              <option value="Internal structural cues only">僅內部結構提示</option>
              <option value="Display functional subheadings">顯示功能型小標題</option>
              <option value="Display custom subheadings">顯示自訂小標題</option>
            </select>
          </div>
          <div class="field">
            <label for="subheadingGranularity">小標題粒度</label>
            <select id="subheadingGranularity">
              <option value="Coarse">粗</option>
              <option value="Medium" selected>中</option>
              <option value="Fine">細</option>
            </select>
          </div>
          <div class="field">
            <label for="customSubheadings">自訂小標題（選填）</label>
            <input id="customSubheadings" type="text" placeholder="例如：主要發現｜結果解釋｜文獻比較｜研究意義｜限制與結論" />
          </div>
        </div>

        <div class="field">
          <label>附加控制</label>
          <div class="check-row">
            <label class="check"><input type="checkbox" id="chkNoFabrication" checked> <span>禁止虛構引用與書目細節</span></label>
            <label class="check"><input type="checkbox" id="chkSeparateObserved" checked> <span>區分直接觀察與文獻脈絡</span></label>
            <label class="check"><input type="checkbox" id="chkSentenceOrder" checked> <span>固定觀察→詮釋→例證→限定的句序</span></label>
            <label class="check"><input type="checkbox" id="chkNoFiller" checked> <span>抑制空泛 academic filler</span></label>
            <label class="check"><input type="checkbox" id="chkMechanismTested" checked> <span>機制後明說本研究未直接測試</span></label>
            <label class="check"><input type="checkbox" id="chkNmaCaution" checked> <span>MA / NMA 審慎解讀</span></label>
          </div>
        </div>
      </section>
    </div>

    <section class="card" style="margin-top:20px;">
      <h2 class="section-title">三、生成結果</h2>
      <div id="output" class="output"></div>

      <div class="actions">
        <button class="secondary" onclick="copyPrompt()">複製結果</button>
        <button class="ghost" onclick="resetOutput()">清空結果</button>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function checked(id){ return $(id).checked; }

    function buildRules(){
      const rules = [];
      if (checked("chkNoFabrication")) {
        rules.push("Do not fabricate citations, author names, publication years, journals, PMIDs, trial names, or unsupported study details.");
      }
      if (checked("chkSeparateObserved")) {
        rules.push("Explicitly distinguish what was directly observed in the present study from what is introduced as prior literature context or empirical example.");
      }
      if (checked("chkSentenceOrder")) {
        rules.push("Use controlled sentence order so that observations, interpretation, examples, and qualification appear in a stable argumentative sequence rather than in loose descriptive prose.");
      }
      if (checked("chkNoFiller")) {
        rules.push("Do not rely on generic academic filler or ornamental transitions such as 'Taken together,' 'It is worth noting that,' or 'In this context,' unless they carry specific argumentative content.");
      }
      if (checked("chkMechanismTested")) {
        rules.push("Whenever a possible mechanism is discussed, state clearly that it was not directly tested in the present study.");
      }
      if (checked("chkNmaCaution")) {
        rules.push("If the study is a meta-analysis or network meta-analysis, interpret pooled effects, indirect comparisons, rankings, certainty, heterogeneity, and assumptions cautiously.");
      }
      return rules;
    }

    function sectionSpecific(section){
      if (section === "Introduction") {
        return [
          "Write only the Introduction section, not any other manuscript section.",
          "Construct the Introduction as a sequence of publishable journal paragraphs rather than a checklist response.",
          "Move from the broader scientific or clinical problem to current evidence, then to the unresolved gap, and finally to the positioning of the present study.",
          "Ensure that the stated gap is actually addressable by the supplied Methods and Results.",
          "Do not overstate novelty, mechanism, or clinical relevance beyond the reported outcomes.",
          "Make the first sentence of each paragraph function as the paragraph's core claim."
        ];
      }
      return [
        "Write only the Discussion section, not any other manuscript section.",
        "Construct the Discussion as a sequence of publishable journal paragraphs rather than a checklist-like response.",
        "Begin with a synthesized statement of the principal findings in claim-led prose rather than numeric repetition.",
        "Body paragraphs should move from observed finding to restrained interpretation to literature-grounded context when appropriate.",
        "When relevant, integrate multiple result domains at the level of convergent pattern, not as proof of a unified causal mechanism.",
        "State biological, conceptual, methodological, or clinical implications only when genuinely supported.",
        "Define limitations concretely and end with a proportionate conclusion aligned with the actual evidence base."
      ];
    }

    function paragraphArchitecture(mode, section, mechanismMode, exampleRequirement, outputMode){
      const lines = [];
      lines.push("The first sentence of every paragraph must function as the paragraph's core claim and make the argumentative purpose of that paragraph immediately visible.");

      if (mode === "Highly condensed claim-led" || outputMode === "Ultra-controlled sentence architecture") {
        lines.push("Use a stable paragraph architecture: sentence 1 states the main claim directly; sentence 2 specifies the relevant observation from the present study; sentence 3 provides restrained interpretation; sentence 4, when applicable, gives one literature-grounded empirical example with a generic placeholder such as [citation]; sentence 5 clarifies the boundary of inference, including that the mechanism was not directly tested here when relevant.");
      } else if (mode === "Topic sentence first") {
        lines.push("Subsequent sentences should elaborate, qualify, or exemplify the claim rather than delay it.");
      }

      if (section === "Discussion" && mechanismMode !== "No mechanism unless unavoidable") {
        lines.push("Whenever a possible mechanism is discussed, move immediately from observed finding to cautious mechanistic interpretation to one prior empirical example placeholder to an explicit statement that the mechanism was not directly tested here.");
      }

      if (exampleRequirement === "One example per proposed mechanism") {
        lines.push("Every proposed mechanism must be followed immediately by one concrete literature-grounded empirical example placeholder.");
      } else if (exampleRequirement === "One example per major paragraph") {
        lines.push("Each major interpretive paragraph should include one concrete literature-grounded empirical example placeholder when relevant.");
      }

      if (outputMode === "Journal-prose forcing prompt") {
        lines.push("Make the prose read like publishable journal writing rather than a response to instructions.");
      }
      return lines;
    }

    function journalOrientationRules(orientation){
      const map = {
        "High-impact general journal": [
          "Keep background and interpretation compressed and high-yield.",
          "Prioritize problem importance, gap sharpness, and clear study positioning.",
          "Avoid overextended literature review behavior."
        ],
        "Clinical specialty journal": [
          "Frame interpretation in a field-relevant manner rather than as broad universal novelty.",
          "Allow somewhat more domain-specific context when it clarifies relevance."
        ],
        "Biomedical journal": [
          "Allow biologically informed interpretation only when clearly tied to the observed outcomes.",
          "Use mechanistic framing cautiously and keep it evidence-aligned rather than speculative.",
          "Maintain conceptual interpretation at the level supported by the data."
        ],
        "Evidence-based journal": [
          "Minimize speculative interpretation and keep all inference tightly evidence-aligned.",
          "Give visible weight to uncertainty, boundaries, and analytic restraint."
        ],
        "Methodologically rigorous journal": [
          "Foreground methodological discipline, inferential boundaries, and analytic assumptions where relevant.",
          "Do not let biological interpretation outrun design-level limits."
        ]
      };
      return map[orientation] || [];
    }

    function scientificLanguageRules(density, tone){
      const out = [
        "Use precise, publication-oriented diction typical of journal prose.",
        "Favor restrained, evidence-aligned, analytically controlled wording.",
        "Avoid vague wording such as 'a lot of studies,' 'very important,' 'huge benefit,' 'clearly proves,' or similarly loose phrasing."
      ];
      if (density === "Highly condensed SCI style") {
        out.push("Write in highly condensed SCI-style prose with direct argumentative movement and minimal waste.");
      } else if (density === "Journal-style condensed") {
        out.push("Write in concise journal prose with limited filler and controlled sentence economy.");
      }
      if (tone === "Conservative") {
        out.push("Keep interpretation cautious and avoid expansive claims.");
      } else if (tone === "Interpretive") {
        out.push("Allow interpretation, but keep it subordinate to the reported evidence and clearly bounded.");
      }
      return out;
    }


    function getDefaultSubheadings(section, granularity){
      const map = {
        "Introduction": {
          "Coarse": ["Background", "Study rationale", "Study objective"],
          "Medium": ["Background", "Current evidence", "Knowledge gap", "Study positioning"],
          "Fine": ["Problem context", "Current evidence", "Unresolved gap", "Why this study was needed", "Study objective"]
        },
        "Discussion": {
          "Coarse": ["Principal findings", "Interpretation", "Limitations", "Conclusion"],
          "Medium": ["Principal findings", "Interpretation", "Literature comparison", "Implications", "Limitations", "Conclusion"],
          "Fine": ["Principal findings", "Result interpretation", "Mechanistic context", "Literature comparison", "Integration", "Implications", "Limitations", "Conclusion"]
        }
      };
      return (map[section] && map[section][granularity]) ? map[section][granularity] : [];
    }

    function subheadingRules(section, mode, granularity, customText){
      const rules = [];
      const defaults = getDefaultSubheadings(section, granularity);
      const customItems = customText.split(/[｜|]+/).map(x => x.trim()).filter(Boolean);

      if (mode === "No visible subheadings") {
        rules.push("Do not use visible subheadings in the final section. Keep the section as continuous journal prose.");
      } else if (mode === "Internal structural cues only") {
        rules.push("Use the following paragraph functions internally to organize the section, but do not display visible subheadings in the final output: " + defaults.join(", ") + ".");
      } else if (mode === "Display functional subheadings") {
        rules.push("Use visible functional subheadings in the final section.");
        rules.push("Use this subheading granularity: " + granularity + ".");
        rules.push("Preferred subheadings: " + defaults.join(", ") + ".");
      } else if (mode === "Display custom subheadings") {
        const items = customItems.length ? customItems : defaults;
        rules.push("Use visible subheadings in the final section.");
        rules.push("Use the following custom or user-aligned subheadings in this order when applicable: " + items.join(", ") + ".");
      }

      return rules;
    }

    function generatePrompt(){
      const methods = $("methods").value.trim();
      const results = $("results").value.trim();
      const topic = $("topic").value.trim() || "Not specified";
      const population = $("population").value.trim() || "Not specified";
      const outcomes = $("outcomes").value.trim() || "Not specified";
      const extraContext = $("extraContext").value.trim();

      if (!methods || !results) {
        $("output").textContent = "請先貼入 Methods 與 Results，這兩欄是生成提示句的必要依據。";
        return;
      }

      const sectionType = $("sectionType").value;
      const studyType = $("studyType").value;
      const targetLanguage = $("targetLanguage").value;
      const discipline = $("discipline").value;
      const journalOrientation = $("journalOrientation").value;
      const length = $("length").value;
      const tone = $("tone").value;
      const paragraphMode = $("paragraphMode").value;
      const proseDensity = $("proseDensity").value;
      const mechanismMode = $("mechanismMode").value;
      const exampleRequirement = $("exampleRequirement").value;
      const outputMode = $("outputMode").value;
      const subheadingMode = $("subheadingMode").value;
      const subheadingGranularity = $("subheadingGranularity").value;
      const customSubheadings = $("customSubheadings").value.trim();

      const parts = [];

      parts.push(`Write the ${sectionType} section of a ${discipline.toLowerCase()} ${studyType.toLowerCase()} in ${targetLanguage}. Do not write any other manuscript sections.`);
      parts.push(`The writing should be suitable for a ${journalOrientation.toLowerCase()} and should read like publishable journal prose rather than a checklist response.`);
      parts.push("");
      parts.push("Study context:");
      parts.push(`- Topic: ${topic}`);
      parts.push(`- Population or model: ${population}`);
      parts.push(`- Main outcomes or result domains: ${outcomes}`);
      parts.push("");
      parts.push("You must rely strictly on the following source material:");
      parts.push("[Methods]");
      parts.push(methods);
      parts.push("");
      parts.push("[Results]");
      parts.push(results);
      parts.push("");

      parts.push("Section-specific requirements:");
      sectionSpecific(sectionType).forEach(rule => parts.push(`- ${rule}`));
      parts.push("");

      parts.push("Paragraph architecture requirements:");
      paragraphArchitecture(paragraphMode, sectionType, mechanismMode, exampleRequirement, outputMode)
        .forEach(rule => parts.push(`- ${rule}`));
      parts.push("");

      if (sectionType === "Discussion") {
        parts.push("Mechanism handling requirements:");
        if (mechanismMode === "No mechanism unless unavoidable") {
          parts.push("- Avoid mechanistic discussion unless it is necessary for interpreting the reported findings.");
        } else if (mechanismMode === "Conservative mechanism only") {
          parts.push("- If a possible mechanism is introduced, present it conservatively as a plausible interpretation rather than an established causal account.");
          parts.push("- Mechanistic language must remain subordinate to the reported data.");
        } else {
          parts.push("- If a possible mechanism is introduced, present it conservatively as a plausible interpretation rather than an established causal account.");
          parts.push("- Mechanistic language must remain subordinate to the reported data.");
          parts.push("- Immediately after each proposed mechanism, provide one concrete empirical example framed as a prior literature-based observation followed by a generic placeholder such as [citation].");
          parts.push("- Immediately state that this example reflects prior literature and that the mechanism was not directly tested in the present study.");
        }
        parts.push("");
      }

      parts.push("Journal-orientation requirements:");
      journalOrientationRules(journalOrientation).forEach(rule => parts.push(`- ${rule}`));
      parts.push("");

      parts.push("Scientific language requirements:");
      scientificLanguageRules(proseDensity, tone).forEach(rule => parts.push(`- ${rule}`));
      parts.push("");

      parts.push("Subheading requirements:");
      subheadingRules(sectionType, subheadingMode, subheadingGranularity, customSubheadings).forEach(rule => parts.push(`- ${rule}`));
      parts.push("");

      parts.push("Mandatory control rules:");
      buildRules().forEach(rule => parts.push(`- ${rule}`));
      parts.push("- Remain strictly faithful to the supplied Methods and Results.");
      parts.push("- Align scope, interpretation, and conclusion with the actual evidence base.");
      parts.push("- Do not encourage decorative writing, rhetorical inflation, speculative overextension, or fabricated citation behavior.");
      if (outputMode === "Direct article-writing prompt") {
        parts.push("- Output the section itself, not instructions, commentary, or a prompt about how to write it.");
      } else if (outputMode === "Journal-prose forcing prompt") {
        parts.push("- Make the final output read as finished manuscript prose rather than an answer to a task description.");
      } else {
        parts.push("- Keep sentence movement tightly controlled so that each paragraph behaves like journal prose under explicit argumentative discipline.");
      }
      parts.push("");

      if (extraContext) {
        parts.push("Additional user requirements:");
        parts.push(extraContext);
        parts.push("");
      }

      parts.push("Output requirement:");
      parts.push(`Return only the final ${sectionType} section in ${targetLanguage}. Do not add prefaces, bullet lists, explanations, headings about instructions, or commentary outside the section itself.`);

      if (length === "Concise") {
        parts.push("Keep the section concise and tightly compressed.");
      } else if (length === "Extended") {
        parts.push("Develop the section fully while preserving journal-level density and control.");
      }

      $("output").textContent = parts.join("\n");
    }

    async function copyPrompt(){
      const text = $("output").textContent;
      try{
        await navigator.clipboard.writeText(text);
        alert("提示句已複製。");
      }catch(e){
        alert("複製失敗，請手動選取文字複製。");
      }
    }

    function resetOutput(){
      $("output").textContent = "";
    }

    function resetAll(){
      ["methods","results","topic","population","outcomes","extraContext","customSubheadings"].forEach(id => $(id).value = "");
      $("sectionType").value = "Discussion";
      $("studyType").value = "Original research";
      $("targetLanguage").value = "English";
      $("discipline").value = "Biomedical";
      $("journalOrientation").value = "Biomedical journal";
      $("length").value = "Standard";
      $("tone").value = "Interpretive";
      $("paragraphMode").value = "Topic sentence first";
      $("proseDensity").value = "Highly condensed SCI style";
      $("mechanismMode").value = "Mechanism plus empirical example";
      $("exampleRequirement").value = "One example per proposed mechanism";
      $("outputMode").value = "Direct article-writing prompt";
      $("subheadingMode").value = "No visible subheadings";
      $("subheadingGranularity").value = "Medium";
      ["chkNoFabrication","chkSeparateObserved","chkSentenceOrder","chkNoFiller","chkMechanismTested","chkNmaCaution"].forEach(id => $(id).checked = true);
      resetOutput();
    }
  </script>
