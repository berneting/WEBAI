<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Search Prompt Generator Pro v3</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
background:linear-gradient(135deg,#06142e,#0f172a,#111827);
color:#e5e7eb;
min-height:100vh;
}

header{
padding:42px 20px 28px;
text-align:center;
}

header h1{
font-size:34px;
margin-bottom:10px;
color:#fff;
}

header p{
max-width:920px;
margin:auto;
line-height:1.8;
color:#cbd5e1;
}

.container{
width:95%;
max-width:1450px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
padding-bottom:50px;
}

.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:24px;
backdrop-filter:blur(14px);
}

h2{
font-size:22px;
margin-bottom:18px;
color:#93c5fd;
}

label{
display:block;
margin-top:14px;
margin-bottom:8px;
font-weight:700;
color:#dbeafe;
}

textarea,select,input{
width:100%;
padding:12px 14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.04);
color:#fff;
font-size:15px;
}

textarea{
min-height:82px;
resize:vertical;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.noteBox{
margin-top:14px;
padding:14px;
border-left:4px solid #38bdf8;
background:rgba(56,189,248,.08);
border-radius:12px;
line-height:1.75;
color:#cbd5e1;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:24px;
}

button{
border:none;
padding:12px 18px;
border-radius:999px;
font-weight:700;
cursor:pointer;
color:#fff;
background:linear-gradient(135deg,#2563eb,#06b6d4);
}

button.alt{
background:#334155;
}

.outputBox{
margin-bottom:18px;
border-radius:16px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
}

.outputHead{
padding:12px 14px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(37,99,235,.35);
font-weight:700;
}

.copyBtn{
padding:7px 12px;
font-size:13px;
border-radius:999px;
background:#0ea5e9;
}

pre{
white-space:pre-wrap;
word-break:break-word;
padding:16px;
line-height:1.75;
font-size:14px;
}

footer{
text-align:center;
padding:30px 15px 40px;
color:#94a3b8;
}

@media(max-width:1000px){
.container{grid-template-columns:1fr;}
.row{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<h1>Research Search Prompt Generator Pro v3</h1>
<p>
升級版：研究場景 × 研究設計連動選單。Animal 模式新增 Laboratory Rodent Model（大小鼠合併）。
適合 Clinical、Animal、Cell、Omics、Mechanism 搜尋。
</p>
</header>

<div class="container">

<!-- LEFT -->
<section class="card">

<h2>研究設定</h2>

<label>研究問題</label>
<textarea id="question" placeholder="例如：Does Antrodia cinnamomea improve liver injury through anti-inflammatory mechanisms?"></textarea>

<div class="row">

<div>
<label>研究場景</label>
<select id="researchMode" onchange="updateMode();updateStudyType();">
<option value="clinical">Clinical｜臨床研究</option>
<option value="animal">Animal｜動物研究</option>
<option value="cell">Cell｜細胞研究</option>
<option value="omics">Omics｜多體學研究</option>
<option value="mechanism">Mechanism｜機轉研究</option>
<option value="mixed">Mixed｜混合研究</option>
</select>
</div>

<div>
<label>研究設計</label>
<select id="studyType"></select>
</div>

</div>

<div id="modeNote" class="noteBox"></div>

<label>P / Species / Cell line</label>
<textarea id="p" placeholder="older adults / rodent / HepG2"></textarea>

<label>I / Intervention</label>
<textarea id="i" placeholder="music therapy / Antrodia cinnamomea / exercise"></textarea>

<label>C / Control</label>
<textarea id="c" placeholder="placebo / vehicle / usual care"></textarea>

<label>O / Outcome</label>
<textarea id="o" placeholder="depression / ALT / inflammation / apoptosis"></textarea>

<label>Animal model</label>
<textarea id="animalModel" placeholder="high-fat diet / CCl4 / LPS-induced model"></textarea>

<label>Cell condition</label>
<textarea id="cellCondition" placeholder="LPS-induced RAW264.7 / palmitic acid HepG2"></textarea>

<label>Mechanism</label>
<textarea id="mechanism" placeholder="NF-kB / Nrf2 / AMPK / mTOR"></textarea>

<label>Omics</label>
<textarea id="omics" placeholder="RNA-seq / lipidomics / metabolomics"></textarea>

<label>備註限制</label>
<textarea id="note" placeholder="English only / last 10 years / exclude review"></textarea>

<div class="buttons">
<button onclick="generatePrompt()">生成提示句</button>
<button class="alt" onclick="clearAll()">清空內容</button>
</div>

</section>

<!-- RIGHT -->
<section class="card">

<h2>輸出結果</h2>

<div class="outputBox">
<div class="outputHead">
<span>AI 總提示句</span>
<button class="copyBtn" onclick="copyText('mainOutput')">複製</button>
</div>
<pre id="mainOutput">請輸入內容後按下生成提示句。</pre>
</div>

<div class="outputBox">
<div class="outputHead">
<span>PubMed</span>
<button class="copyBtn" onclick="copyText('pubmedOutput')">複製</button>
</div>
<pre id="pubmedOutput"></pre>
</div>

<div class="outputBox">
<div class="outputHead">
<span>Google Scholar</span>
<button class="copyBtn" onclick="copyText('scholarOutput')">複製</button>
</div>
<pre id="scholarOutput"></pre>
</div>

<div class="outputBox">
<div class="outputHead">
<span>Embase</span>
<button class="copyBtn" onclick="copyText('embaseOutput')">複製</button>
</div>
<pre id="embaseOutput"></pre>
</div>

</section>
</div>

<footer>
Research Search Prompt Generator Pro v3
</footer>

<script>

const options = {

clinical:[
["systematic review","Systematic Review / Meta-analysis"],
["randomized trial","Randomized Controlled Trial"],
["clinical trial","Clinical Trial"],
["cohort study","Cohort Study"],
["case-control","Case-Control Study"]
],

animal:[
["rodent model","Laboratory Rodent Model (Mouse + Rat)"],
["mouse model","Mouse Model Only"],
["rat model","Rat Model Only"],
["zebrafish model","Zebrafish Model"],
["in vivo study","General In Vivo Study"],
["disease model","Disease Model Study"]
],

cell:[
["cell line study","Cell Line Study"],
["in vitro study","In Vitro Study"],
["primary cell","Primary Cell Study"],
["co-culture","Co-culture Study"]
],

omics:[
["transcriptomics","Transcriptomics"],
["proteomics","Proteomics"],
["metabolomics","Metabolomics"],
["lipidomics","Lipidomics"]
],

mechanism:[
["pathway study","Signaling Pathway Study"],
["oxidative stress","Oxidative Stress Study"],
["inflammation","Inflammation Study"],
["autophagy","Autophagy Study"]
],

mixed:[
["broad biomedical","Broad Biomedical Search"],
["clinical + animal","Clinical + Animal"],
["animal + cell","Animal + Cell"],
["mechanism + omics","Mechanism + Omics"]
]

};

function updateStudyType(){
let mode=document.getElementById("researchMode").value;
let target=document.getElementById("studyType");
target.innerHTML="";

options[mode].forEach(item=>{
let op=document.createElement("option");
op.value=item[0];
op.textContent=item[1];
target.appendChild(op);
});
}

function updateMode(){

let mode=document.getElementById("researchMode").value;
let box=document.getElementById("modeNote");

const notes={

clinical:"Clinical：真人研究，使用 PICO 架構。",

animal:"Animal：動物研究。Rodent Model = mouse + rat，適合前期廣搜與系統性回顧。",

cell:"Cell：細胞研究，常見 HepG2、RAW264.7、AML-12。",

omics:"Omics：RNA-seq、脂質體、代謝體等。",

mechanism:"Mechanism：NF-kB、AMPK、Nrf2、mTOR 等路徑。",

mixed:"Mixed：跨領域整合搜尋。"

};

box.textContent=notes[mode];

}

function val(id){
return document.getElementById(id).value.trim();
}

function rodentKeywords(type){

if(type==="rodent model"){
return "(mouse OR mice OR murine OR rat OR rats OR rodent OR rodents)";
}

if(type==="mouse model"){
return "(mouse OR mice OR murine)";
}

if(type==="rat model"){
return "(rat OR rats)";
}

return "";
}

function generatePrompt(){

let q=val("question");
let mode=val("researchMode");
let type=val("studyType");
let p=val("p");
let i=val("i");
let c=val("c");
let o=val("o");
let am=val("animalModel");
let cc=val("cellCondition");
let me=val("mechanism");
let om=val("omics");
let note=val("note");

let animalExpand = rodentKeywords(type);

let pubmed = `${animalExpand || p} AND (${i}) AND (${o})`;
let scholar = `"${p}" "${i}" "${o}"`;
let embase = `${animalExpand || p} AND (${i}) AND (${o})`;

let main = `請根據以下設定建立搜尋策略：

Research Question:
${q}

Research Mode:
${mode}

Study Type:
${type}

Population / Model:
${p}

Intervention:
${i}

Control:
${c}

Outcome:
${o}

Animal Model:
${am}

Cell Condition:
${cc}

Mechanism:
${me}

Omics:
${om}

Notes:
${note}

請產出：
1. 同義詞與關鍵字
2. PubMed 搜尋式
3. Embase 搜尋式
4. Google Scholar 搜尋式
5. Broad 與 Focused 版本
6. 漏文獻風險提醒`;

document.getElementById("mainOutput").textContent=main;
document.getElementById("pubmedOutput").textContent=pubmed;
document.getElementById("scholarOutput").textContent=scholar;
document.getElementById("embaseOutput").textContent=embase;

}

function copyText(id){
navigator.clipboard.writeText(document.getElementById(id).textContent);
alert("已複製");
}

function clearAll(){
document.querySelectorAll("textarea").forEach(x=>x.value="");
document.getElementById("mainOutput").textContent="請輸入內容後按下生成提示句。";
document.getElementById("pubmedOutput").textContent="";
document.getElementById("scholarOutput").textContent="";
document.getElementById("embaseOutput").textContent="";
}

updateMode();
updateStudyType();

</script>

</body>
</html>
